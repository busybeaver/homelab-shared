---
name: 'Public Key CI'

"on":
  # when the 'General CI' completed (especially the 'Public Key Verification'
  # job)
  workflow_run:
    workflows: ['General CI']
    types:
      - completed

concurrency:
  # on main, we want all builds to complete even if commits/merging happens
  # faster to make it easier to discover at which point something broke;
  # else, we cancel "old" builds and run/(re)start the build with the
  # latest changes
  group: >-
    ${{github.ref == 'refs/heads/main' &&
    format('ci-main-{0}-{1}', github.workflow, github.sha) ||
    format('ci-{0}-{1}', github.workflow, github.ref)}}

jobs:
  public_key_verification:
    name: 'Upload and Sign Public Key'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # only run if:
    # - the triggering workflows (the workflows that triggered this github
    #   action) completed/finished with success
    # - the build runs on the default branch
    if: >-
      ${{github.event.workflow_run.conclusion == 'success' &&
      github.ref ==
      format('refs/heads/{0}', github.event.repository.default_branch)}}

    defaults:
      run:
        shell: bash
        working-directory: '.'

    permissions:
      contents: read
      packages: write

    env:
      # renovate: datasource=github-releases depName=sigstore/cosign
      COSIGN_VERSION: v3.0.5
      REGISTRY: ghcr.io  # GitHub Registry

    steps:
      - name: StepSecurity - Harden Github-hosted Runners
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit
          disable-telemetry: true
          disable-sudo: true

      - name: Git - Checkout
        id: git_checkout
        # v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # required by tj-actions/changed-files
          fetch-depth: 2

      - name: Cosign - Setup
        id: cosign_setup
        # v4.0.0
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad
        with:
          cosign-release: ${{env.COSIGN_VERSION}}

      - name: Git - Get Changed Files
        id: git_changed_files
        # yamllint disable-line rule:line-length
        uses: tj-actions/changed-files@8cba46e29c11878d930bca7870bb54394d3e8b21  # v47.0.2
        with:
          files: |
            ./public_key/cosign.pub

      - name: Docker - Log into Registry
        id: docker_login
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        # if: steps.git_changed_files.outputs.any_changed == 'true'
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Cosign - Upload and Sign Public Key
        id: cosign_sign
        run: |
          ARTIFACT="${{env.REGISTRY}}/${{github.repository}}/cosign.pub"
          cosign upload blob -f cosign.pub --verbose \
            -a "repo=${{github.repository}}" \
            -a "workflow=${{github.workflow}}" \
            -a "ref=${{github.sha}}" \
            "${ARTIFACT}"
          cosign sign --key env://COSIGN_PRIVATE_KEY --verbose \
            -a "repo=${{github.repository}}" \
            -a "workflow=${{github.workflow}}" \
            -a "ref=${{github.sha}}" \
            "${ARTIFACT}"
        working-directory: ./public_key/
        env:
          COSIGN_PRIVATE_KEY: ${{secrets.COSIGN_PRIVATE_KEY}}
          COSIGN_PASSWORD: ${{secrets.COSIGN_PASSWORD}}
