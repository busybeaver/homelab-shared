---
name: 'General CI'

"on":
  # run on pushes to main
  push:
    branches:
      - main
      - gh-readonly-queue/main/**
  # run on pull requests that target the main branch
  pull_request:
    branches:
      - main
  # run weekly on Monday at 12:00
  schedule:
    - cron: '0 12 * * 1'
  # run manually
  workflow_dispatch: {}
  # allows to reuse the workflow in other repositories
  workflow_call:
    inputs:
      filterRegexExclude:
        description: 'Regular expression defining which files will be excluded from linting'
        type: string
        default: none
      lintTypescript:
        description: 'Flag to enable or disable the linting process of the TypeScript language. (Utilizing: eslint)'
        type: boolean
        default: false
      lintDocker:
        description: 'Flag to enable or disable the linting process of the Docker language. (Utilizing: hadolint)'
        type: boolean
        default: false
    secrets:
      # necessary permissions: 'contents: read', 'statuses: write'
      GITGUARDIAN_API_KEY:
        description: 'API key used for authenticating against the GitGuardian APIs'
        required: true

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  code_quality:
    name: 'Code Quality Checks'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash
        working-directory: '.'

    permissions:
      contents: read
      statuses: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      # https://github.com/actions/runner/issues/409#issuecomment-752775072
      FILTER_REGEX_EXCLUDE: ${{ inputs.filterRegexExclude || 'none' }}
      VALIDATE_ALL_CODEBASE: ${{ github.event_name != 'pull_request' }}
      VALIDATE_BASH: true
      VALIDATE_EDITORCONFIG: true
      VALIDATE_GITHUB_ACTIONS: true
      VALIDATE_GITLEAKS: true
      VALIDATE_JSON: true
      VALIDATE_MARKDOWN: true
      VALIDATE_NATURAL_LANGUAGE: true
      VALIDATE_SHELL_SHFMT: true
      VALIDATE_YAML: true

    steps:
      - name: StepSecurity - Harden Github-hosted Runners
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Git - Checkout
        id: git_checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Checkout full git history; required by git-leaks
          fetch-depth: 0

      - name: SuperLinter - Set Dynamic Environment
        id: superlinter_env
        run: |
          # We only set the variables to 'true' if the input is true.
          # We avoid setting them to 'false' because SuperLinter does not allow
          # mixing 'true' and 'false' for VALIDATE_* variables.
          if [ "${{ inputs.lintDocker }}" = "true" ]; then
            echo "VALIDATE_DOCKERFILE_HADOLINT=true" >> "$GITHUB_ENV"
          fi
          if [ "${{ inputs.lintTypescript }}" = "true" ]; then
            echo "VALIDATE_TYPESCRIPT_ES=true" >> "$GITHUB_ENV"
          fi

      - name: SuperLinter - Lint Files
        id: superlinter_scan
        uses: super-linter/super-linter/slim@61abc07d755095a68f4987d1c2c3d1d64408f1f9  # v8.5.0

  git_secrets:
    name: 'Git Secret Exposure Checks'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: '.'

    permissions:
      contents: read
      statuses: write

    steps:
      - name: StepSecurity - Harden Github-hosted Runners
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo: true
          allowed-endpoints: >
            api.gitguardian.com:443
            api.github.com:443
            dashboard.gitguardian.com:443
            github.com:443

      - name: Git - Checkout
        id: git_checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Checkout full git history; required by GitGuardian
          fetch-depth: 0

      - name: GitGuardian - Scan For Commited Secrets
        id: gitguardian_scan
        uses: GitGuardian/ggshield-action@50c99a7fbe0e313f962dc5bb74d8271e02543c3a  # v1.48.0

        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  public_key_verification:
    name: 'Public Key Verification'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: '.'

    permissions:
      contents: read

    env:
      # renovate: datasource=github-releases depName=sigstore/cosign
      COSIGN_VERSION: v3.0.5

    steps:
      - name: StepSecurity - Harden Github-hosted Runners
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo-and-containers: true
          allowed-endpoints: >
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Git - Checkout
        id: git_checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cosign - Setup
        id: cosign_setup
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Cosign - Verify Public Key
        id: cosign_verify
        run: |
          cosign verify-blob --key cosign.pub --signature cosign.pub.sig cosign.pub
        working-directory: ./public_key/
